<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <nav class="nav">
    <a href="{{ '/' | relative_url }}" class="nav__logo">Bulelani Kote</a>
    <div class="nav__links">
      <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Home</a>
      <a href="{{ '/projects' | relative_url }}" {% if page.url == '/projects' %}class="active"{% endif %}>Projects</a>
      <a href="{{ '/poetry/' | relative_url }}" {% if page.url contains 'poetry' %}class="active"{% endif %}>Poetry</a>
      <a href="{{ '/contact' | relative_url }}" {% if page.url == '/contact' %}class="active"{% endif %}>Contact</a>
    </div>
  </nav>
  <main class="main">
    {{ content }}
  </main>
  <footer class="footer">
    <div class="footer__inner">
      <p class="footer__tagline">Built with curiosity, code, and a love for words.</p>
      <div class="footer__links">
        <a href="https://www.linkedin.com/in/bulelani-kote" target="_blank" rel="noopener">LinkedIn</a>
        <a href="https://github.com/BulelaniKote" target="_blank" rel="noopener">GitHub</a>
      </div>
      <p class="footer__copy">&copy; {{ 'now' | date: '%Y' }} Bulelani Kote</p>
    </div>
  </footer>
</body>
</html>
